name: Update Dataset from Google Sheets

on:
  schedule:
    - cron: '0 0 * * *'  
  workflow_dispatch:  

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download CSV from Google Sheets
        run: |
          
          curl -L "https://docs.google.com/spreadsheets/d/1goX2DPIbNrL1PBWRVJbhAsLVzQ-s1sMUOctejXMzbt8/export?format=csv" -o dataset.csv

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add dataset.csv
          git commit -m "Auto-update dataset from Google Sheets" || echo "No changes to commit"
          git push
